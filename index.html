<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco Gassner</title>

<style>
:root{
--text:#0f2f73;
--muted:#5c74a3;
--line:rgba(15,47,115,.10);
--accent:#2f80ed;
--bg:#f5f8fc;
--panel:rgba(255,255,255,.8);
--shadow:0 24px 60px rgba(16,48,112,.08);
--radius:26px;
--max:1120px;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
}

.wrap{
width:min(calc(100% - 2rem),var(--max));
margin:auto;
}

/* ---------- TOP ---------- */

.topbar{
display:grid;
grid-template-columns:1fr auto;
align-items:start;
padding:.9rem 0 .2rem;
}

.brand{
display:flex;
gap:.7rem;
align-items:flex-start;
}

/* KOMOREBI SKETCH */
.brand-mark{
width:50px;height:50px;
border-radius:14px;
background:#fff;
border:1px solid var(--line);
position:relative;
}

.brand-mark::before{
content:"";
position:absolute;
left:6px;top:6px;
width:12px;height:12px;
border-radius:50%;
background:rgba(200,170,90,.2);
border:1px solid rgba(0,0,0,.15);
}

/* rays */
.brand-mark::after{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(110deg, transparent 45%, rgba(0,0,0,.12) 46%, transparent 47%),
linear-gradient(95deg, transparent 55%, rgba(0,0,0,.10) 56%, transparent 57%),
linear-gradient(80deg, transparent 65%, rgba(0,0,0,.08) 66%, transparent 67%);
}

/* trunk */
.brand-mark span{
position:absolute;
left:50%;bottom:6px;
width:1.5px;height:20px;
background:rgba(0,0,0,.2);
transform:translateX(-50%);
}

/* NAME */
.brand-name{
display:flex;
gap:.05rem;
font-size:1.05rem;
letter-spacing:-.02em;
}

.initial{font-weight:700}
.name-rest{font-weight:500}

.subline{
font-size:.75rem;
color:var(--muted);
}

/* NAV RIGHT */
.nav{
display:flex;
gap:.4rem;
padding:.3rem;
border:1px solid var(--line);
border-radius:999px;
background:white;
justify-self:end;
}

.tab-button{
border:0;
background:none;
padding:.6rem 1rem;
border-radius:999px;
cursor:pointer;
color:var(--muted);
}

.tab-button.active{
background:rgba(47,128,237,.15);
color:var(--text);
}

/* ---------- SCROLL SYSTEM ---------- */

.scroll-stage{
height:300vh;
}

.stack-area{
position:sticky;
top:0;
height:100vh;
}

.stack-card{
position:absolute;
width:100%;
top:5.8rem;
}

/* ---------- HOME LAYOUT ---------- */

.grid{
display:grid;
grid-template-columns:220px 1fr;
gap:1.2rem;
}

.panel{
background:var(--panel);
border:1px solid var(--line);
border-radius:var(--radius);
padding:1.2rem;
box-shadow:var(--shadow);
}

/* IMAGE */
.portrait{
aspect-ratio:4/5;
border-radius:20px;
overflow:hidden;
background:#ddd;
}

/* TEXT */
h1{
font-size:2rem;
margin-bottom:.5rem;
}

p{
color:var(--muted);
line-height:1.7;
}

/* BLANK VISUAL */
.blank{
height:140px;
border:1px dashed var(--line);
border-radius:18px;
margin-top:.6rem;
}

/* ---------- CV + ACADEMIA ---------- */

.big{
min-height:60vh;
}

/* ---------- SCROLL FX ---------- */

.stack-card{
transition:.15s linear;
}

/* ---------- JS HELP ---------- */

</style>
</head>

<body>

<div class="wrap">

<header class="topbar">

<div class="brand">
<div class="brand-mark"><span></span></div>

<div>
<div class="brand-name">
<span class="initial">Ma</span><span class="name-rest">rco</span>
<span class="initial">Ga</span><span class="name-rest">ssner</span>
</div>
<div class="subline">Digital Mental Health</div>
</div>
</div>

<nav class="nav">
<button class="tab-button active" data-page="home">Home</button>
<button class="tab-button" data-page="cv">CV</button>
<button class="tab-button" data-page="academia">Academia</button>
</nav>

</header>

<main>

<section class="scroll-stage" id="stage">

<div class="stack-area">

<!-- HOME -->
<div class="stack-card" id="home">
<div class="grid">

<div>
<div class="portrait"></div>
</div>

<div class="panel">
<h1>Good to have you here.</h1>
<p>PhD candidate in digital mental health.</p>

<div class="blank"></div>
</div>

</div>
</div>

<!-- CV -->
<div class="stack-card" id="cv">
<div class="panel big">
<h2>CV</h2>
</div>
</div>

<!-- ACADEMIA -->
<div class="stack-card" id="academia">
<div class="panel big">
<h2>Academia</h2>
</div>
</div>

</div>

</section>

</main>

</div>

<script>
const stage = document.getElementById("stage");
const home = document.getElementById("home");
const cv = document.getElementById("cv");
const ac = document.getElementById("academia");

function update(){
const r = stage.getBoundingClientRect();
const progress = Math.min(Math.max(-r.top / (stage.offsetHeight - innerHeight),0),1);

const p1 = Math.min(progress / .5,1);
const p2 = Math.min(Math.max((progress-.5)/.5,0),1);

home.style.opacity = 1-p1;
home.style.transform = `translateY(${-120*p1}px)`;

cv.style.opacity = p1;
cv.style.transform = `translateY(${120-120*p1}px)`;

ac.style.opacity = p2;
ac.style.transform = `translateY(${140-140*p2}px)`;
}

addEventListener("scroll",update);
addEventListener("resize",update);
update();
</script>

</body>
</html>
